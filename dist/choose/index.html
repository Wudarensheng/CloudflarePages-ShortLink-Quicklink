<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>选择 </title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: #f8f9fa;
      color: #333;
      padding: 2rem 1rem;
    }
    .container {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: #222;
    }
    .option-card {
      display: block;
      padding: 1.5rem;
      margin-bottom: 1rem;
      background: #fff;
      border-radius: 0.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-decoration: none;
      color: #333;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    .option-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      border-color: #333;
    }
    .option-label {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .option-desc {
      font-size: 0.9rem;
      color: #888;
    }
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      color: #666;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>选择 </h1>
    
      <a href="https://example.com" class="option-card" data-index="0">
        <div class="option-label">Link 1</div>
        <div class="option-desc">Describe 1</div>
      </a>
      
      <a href="https://example.net" class="option-card" data-index="1">
        <div class="option-label">Link 2</div>
        <div class="option-desc">Describe 2</div>
      </a>
      
      <a href="https://example.org" class="option-card" data-index="2">
        <div class="option-label">Link 3</div>
        <div class="option-desc">Describe 3</div>
      </a>
    <a href="https://yourblog.example.com" class="back-link">← 回到博客</a>
  </div>
</body>
</html>
