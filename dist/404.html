<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 短链不存在</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: #f8f9fa;
      color: #333;
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 90%;
    }
    .code { font-size: 5rem; font-weight: 700; color: #e74c3c; line-height: 1; }
    h1 { margin: 1rem 0 0.5rem; font-size: 1.4rem; }
    p { color: #888; font-size: 0.95rem; margin-bottom: 1.5rem; }
    code { background: #f0f0f0; padding: 0.15em 0.4em; border-radius: 4px; }
    a {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      background: #333;
      color: #fff;
      border-radius: 0.5rem;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    a:hover { background: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>短链不存在</h1>
    <p>路径 <code>/不存在的短链</code> 没有对应的跳转目标。</p>
    <a href="https://yourblog.example.com">回到博客 →</a>
  </div>
</body>
</html>
